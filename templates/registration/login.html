{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}
Login
{% endblock %}

{% block content %}
<div class="container w-50">
  {% if next %}
    <div class="alert alert-info">
      <p class="m-0">Please login to continue.</p>
    </div>
  {% endif %}
  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    {{ form|crispy }}
    <button type="submit" class="btn btn-primary">Login</button>
  </form>
</div>
{% endblock %}
