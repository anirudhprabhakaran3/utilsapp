<table class="table table-hover">
    <thead>
        <tr>
            <th>Date</th>
            <th>Link</th>
        </tr>
    </thead>
    <tbody>
        {% for log in logs %}
            <tr>
                <td>{{ log.date }}</td>
                <td><a href="{% url 'logger_edit_log' pk=log.pk %}">View more</a></td>
            </tr>
        {% endfor %}
    </tbody>
</table>
