{% extends "base.html" %}
{% load crispy_forms_tags %}

{% block title %}
Add {{ form_type }}
{% endblock %}

{% block content %}
<div class="container">
    <h1>Welcome to Work Logger</h1>
    <h3>Add {{ form_type }} for {{ today }}</h3>

    <form method="post">
        {% csrf_token %}
        {{ form|crispy }}

        <button type="submit" class="btn btn-success">Submit</button>
    </form>
</div>
{% endblock %}
